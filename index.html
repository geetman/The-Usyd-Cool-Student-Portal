<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USYD Portal</title>
<meta name="description" content="A fast link portal for University of Sydney students.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=Inter:wght@400;500&family=JetBrains+Mono&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>
<body>

<canvas id="bg-canvas" aria-hidden="true"></canvas>

<header class="topbar">
  <form class="search-form" role="search" autocomplete="off">
    <img class="search-icon" src="assets/icons/search.png" width="18" height="18" alt="" aria-hidden="true">
    <input id="search-input" type="text" placeholder="Search links…" aria-label="Search links">
  </form>

  <a class="icon-btn" href="https://github.com/" target="_blank" rel="noopener" aria-label="View project on GitHub" id="github-btn">
    <img src="assets/icons/github.png" width="20" height="20" alt="GitHub">
  </a>
</header>

<main id="app-root">
  <section class="focus-panel" id="focus-panel" aria-live="polite">
    <div class="panel-header">
      <div class="panel-icon" id="panel-icon" aria-hidden="true"></div>
      <div class="panel-heading">
        <h1 class="panel-title" id="panel-title">—</h1>
        <p class="panel-desc" id="panel-desc"></p>
      </div>
    </div>
    <div class="panel-divider"></div>
    <ul class="link-list" id="link-list" role="listbox" aria-label="Category links"></ul>
    <p class="no-results" id="no-results" hidden>No matches found.</p>
  </section>

  <div class="coverflow" id="coverflow" role="list" aria-label="Categories"></div>
</main>

<button class="mute-toggle" id="mute-toggle" aria-label="Mute sound" aria-pressed="false">
  <img id="mute-icon-on" src="assets/icons/mute-on.png" width="18" height="18" alt="" aria-hidden="true">
  <img id="mute-icon-off" src="assets/icons/mute-off.png" width="18" height="18" alt="" aria-hidden="true" hidden>
</button>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
