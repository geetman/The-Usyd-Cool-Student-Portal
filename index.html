<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USYD Portal</title>
<meta name="description" content="A fast link portal for University of Sydney students.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=Inter:wght@400;500&family=JetBrains+Mono&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>
<body>

<canvas id="bg-canvas" aria-hidden="true"></canvas>

<header class="topbar">
  <form class="search-form" role="search" autocomplete="off">
    <img class="search-icon" src="assets/search.png" width="18" height="18" alt="" aria-hidden="true">
    <input id="search-input" type="text" placeholder="Search links…" aria-label="Search links">
  </form>

  <a class="icon-btn" href="https://github.com/" target="_blank" rel="noopener" aria-label="View project on GitHub" id="github-btn">
    <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
      <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
      0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
      -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07
      -1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82
      a7.6 7.6 0 0 1 4 0c1.53-1.03 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15
      0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38
      A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/>
    </svg>
  </a>
</header>

<main id="app-root">
  <section class="focus-panel" id="focus-panel" aria-live="polite">
    <div class="panel-header">
      <div class="panel-icon" id="panel-icon" aria-hidden="true"></div>
      <div class="panel-heading">
        <h1 class="panel-title" id="panel-title">—</h1>
        <p class="panel-desc" id="panel-desc"></p>
      </div>
    </div>
    <div class="panel-divider"></div>
    <ul class="link-list" id="link-list" role="listbox" aria-label="Category links"></ul>
    <p class="no-results" id="no-results" hidden>No matches found.</p>
  </section>

  <div class="coverflow" id="coverflow" role="list" aria-label="Categories"></div>
</main>

<button class="mute-toggle" id="mute-toggle" aria-label="Mute sound" aria-pressed="false">
  <svg id="mute-icon-on" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
    <path d="M4 9v6h4l5 5V4L8 9H4Z" fill="currentColor"/>
    <path d="M16.5 8.5a5 5 0 0 1 0 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M19 6a9 9 0 0 1 0 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
  </svg>
  <svg id="mute-icon-off" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true" hidden>
    <path d="M4 9v6h4l5 5V4L8 9H4Z" fill="currentColor"/>
    <line x1="16" y1="9" x2="21" y2="15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="21" y1="9" x2="16" y2="15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
  </svg>
</button>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
